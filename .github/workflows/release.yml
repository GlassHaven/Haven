name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

# Shared by both jobs.
env:
  # Force JS actions still declaring node20 (softprops/action-gh-release@v2
  # as of v2.6.1) onto Node.js 24 ahead of GitHub's 2026-06-02 deprecation.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Unit tests run once — flavor-agnostic, not worth duplicating per ABI.
  test:
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-toolchain
      - name: Run release unit tests
        run: ./gradlew testReleaseUnitTest
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  # One signed APK + AAB per ABI in parallel — roughly halves wall time vs
  # running all four Gradle tasks sequentially in a single job.
  build:
    needs: test
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64, x64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-toolchain
      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > haven-release.jks
      - name: Build signed APK + AAB (${{ matrix.abi }})
        run: ./gradlew :app:assemble${{ matrix.abi == 'arm64' && 'Arm64' || 'X64' }}Release :app:bundle${{ matrix.abi == 'arm64' && 'Arm64' || 'X64' }}Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: haven-${{ matrix.abi }}-release
          path: |
            app/build/outputs/apk/${{ matrix.abi }}/release/haven-*-release.apk
            app/build/outputs/bundle/${{ matrix.abi }}Release/*.aab
          if-no-files-found: error
          retention-days: 7

  # Aggregate both ABIs onto a single GitHub release. Splitting this from
  # build lets the per-ABI jobs run in parallel while the release step
  # still sees every artifact.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    # Publish is just artifact download + GitHub Release upload — no heavy
    # compile work. Keep on the free 4-core runner to avoid spending larger-
    # runner minutes on ~20 seconds of I/O.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: haven-arm64-release
          path: release/
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: haven-x64-release
          path: release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/**/*.apk
            release/**/*.aab
